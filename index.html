<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slovian</title>
  <style>
    body {
  background: #0d1117;
  color: #e6edf3;
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 2rem;
  min-height: 100vh;           /* ← poprawione */
}

.container { max-width: 800px; margin: 0 auto; }

textarea {
  width: 100%;
  min-height: 140px;
  background: #161b22;
  color: #e6edf3;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 1rem;
  font-size: 1.1rem;
  margin: 1rem 0;
}
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align:center; color:#58a6ff">Slovian</h1>
    
    <form method="POST">
      <textarea name="content" placeholder="Wpisz tekst..." autofocus>{{ original }}</textarea>
      <button type="submit">Przetwórz</button>
    </form>
    
    {% if result %}
    <div class="result">
      <strong>Wynik:</strong><br>{{ result }}
    </div>
    {% endif %}
  </div>
</body>
</html>
