<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Perkladačь (Interfejs)</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f6f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 1100px; width: 100%; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 200px; padding: 15px; border-radius: 12px; border: 1px solid #d1d9e0; resize: none; }
        .main-btn { width: 100%; padding: 15px; background: #0055ff; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Perkladačь slověnьskogo ęzyka</h1>
        <div style="text-align:center; margin-bottom:10px;">
            <label><input type="radio" name="dir" value="pl_sl" checked> PL ➔ SL</label>
            <label><input type="radio" name="dir" value="sl_pl"> SL ➔ PL</label>
        </div>
        <textarea id="srcText" placeholder="Wpisz tekst..."></textarea>
        <button class="main-btn" onclick="sendToTranslate()">🚀 TŁUMACZ (PRZEZ PHP)</button>
        <textarea id="resText" readonly placeholder="Wynik pojawi się tutaj..."></textarea>
    </div>

    <script>
        async function sendToTranslate() {
            const text = document.getElementById('srcText').value;
            const direction = document.querySelector('input[name="dir"]:checked').value;
            const resArea = document.getElementById('resText');

            resArea.value = "Tłumaczenie...";

            try {
                // TUTAJ WPISZ ADRES DO SWOJEGO SERWERA PHP (np. na innym hostingu)
                const response = await fetch('https://TWOJ-SERWER-Z-PHP.pl/translator.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `text=${encodeURIComponent(text)}&dir=${direction}`
                });
                
                const result = await response.text();
                resArea.value = result;
            } catch (error) {
                resArea.value = "Błąd: Serwer PHP nie odpowiedział. GitHub nie obsługuje PHP.";
            }
        }
    </script>
</body>
</html>
