<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Slovian Translator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input, select {
      background: #334155;
      color: white;
    }

    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      text-align: center;
      font-size: 20px;
      min-height: 40px;
    }

    .direction {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Slovian Translator</h1>

  <div class="direction">
    <select id="direction">
      <option value="pl-sl">Polski → Slovian</option>
      <option value="sl-pl">Slovian → Polski</option>
    </select>
  </div>

  <input type="text" id="inputText" placeholder="Wpisz słowo..." />

  <button onclick="translate()">Tłumacz</button>

  <div class="result" id="result"></div>
</div>

<script>
async function translate() {
  const text = document.getElementById("inputText").value;
  const direction = document.getElementById("direction").value;

  if (!text) return;

  try {
    const response = await fetch(`/translate?word=${encodeURIComponent(text)}&dir=${direction}`);
    const data = await response.text();

    document.getElementById("result").innerText = data;
  } catch (e) {
    document.getElementById("result").innerText = "Błąd połączenia z backendem";
  }
}

// Enter = translate
document.getElementById("inputText").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    translate();
  }
});
</script>

</body>
</html>
